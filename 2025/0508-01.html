<script>
function makeTable() {
	const csv = document.getElementById('csvData');
	const tab = document.getElementById('myTable');
	tab.innerHTML = '<tr><th>名前</th><th>身長</th><th>年齢</th></tr>';
	for (const row of csv.text.split('\n')) {
		if (row.trim() === '') continue;
		const tr = document.createElement('tr');
		for (const col of row.split(',')) {
			const td = document.createElement('td');
			td.textContent = col.trim();
			tr.appendChild(td);
		}
		tab.appendChild(tr);
	}
}
</script>
