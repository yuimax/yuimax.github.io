<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>AI画像の個性を比較</title>
<base href="../img/vr/">
<base target="_view">
<style>
img#map {
	white-space: nowrap;
}
</style>
</head>
<body>
<div style="margin-left: 1em; overflow-x: auto;">
<h1>AI画像の個性を比較</h1>
<img id="map" src="combined_image.jpg" alt="8画像を結合" usemap="#image-map" width="640" height="320">
<map name="image-map">
	<script>
	function write_area(coords, id, title) {
		document.write(`<area shape="rect" coords="${coords}" href="${id}.jpg" alt="${title}" title="${title}">`);
	}
	write_area('000,000,159,159', 'cathy-vroid', 'Cathy / vroid 元画像');
	write_area('160,000,319,159', 'cathy-grok-Renoir', 'Cathy / Grok / ルノアール風');
	write_area('320,000,479,159', 'cathy-gemini-Ukiyoe', 'Cathy / Gemini / 浮世絵風');
	write_area('480,000,639,159', 'cathy-copilot-Ukiyoe', 'Cathy / Copilot / 浮世絵風');
	write_area('000,160,159,319', 'daisy-vroid', 'Daisy / vroid 元画像');
	write_area('160,160,319,319', 'daisy-grok-Renoir', 'Daisy / Grok / ルノアール風');
	write_area('320,160,479,319', 'daisy-gemini-Ukiyoe', 'Daisy / Gemini / 浮世絵風');
	write_area('480,160,639,319', 'daisy-copilot-Ukiyoe', 'Daisy / Copilot / 浮世絵風');
	</script>
</map>
<ul style="padding-left: 1.25em;">
<li>左から、VRoid 元画像、Grok ルノアール風、Gemini 浮世絵風、Copilot 浮世絵風 である</li>
<li>それぞれ「ｘｘｘ風に変えてください」と依頼し、２～３回リテイクした<br><br></li>
<li>Grokのルノアール風は、いかにもそれっぽくて良い<br><br></li>
<li>Gemini と Copilot は、同じ浮世絵風でも、かなり個性が違う</li>
<li>たぶん Gemini は、浮世絵を「色っぽいマンガ」と認識している</li>
<li>一方 Copilot は、浮世絵を「素朴な木版画」と認識している</li>
</ul>
</div>
</body>
</html>
