<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>foo-bar-baz</title>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    #main {
      margin: 8px;
    }
    h1, h2, h3, p {
      margin: 12px 16px; /* 上下、左右 */
    }
    ul {
			padding-left: 2em;
      line-height: 150%;
    }
    table {
      margin: 12px 2em;
      padding: 4px;
      border-collapse: collapse;
      line-height: 150%;
      white-space: nowrap;
    }
    th {
      background: #f0f0f0;
      border: 1px solid gray;
      padding: 4px 8px;
      text-align: left;
    }
    td {
      background: #ffffff;
      border: 1px solid gray;
      padding: 2px 8px;
    }
  </style>
</head>
<body>
  <h1>foo-bar-baz</h1>
  <ul>
  <li><a href="https://ja.wikipedia.org/wiki/メタ構文変数">https://ja.wikipedia.org/wiki/メタ構文変数</a>
  <li><a href="https://datatracker.ietf.org/doc/html/rfc3092">https://datatracker.ietf.org/doc/html/rfc3092</a>
  </ul>
  <table>
  <tr><th>No.<th>RFC3092<th>分派
  <tr><td>1<td>foo<td>
  <tr><td>2<td>bar<td>
  <tr><td>3<td>baz<td>
  <tr><td>4<td>qux<td>
  <tr><td>5<td>quux<td>
  <tr><td>6<td>corge<td>quuux
  <tr><td>7<td>grault<td>quuuux
  <tr><td>8<td>garply<td>quuuuux
  <tr><td>9<td>waldo<td>
  <tr><td>10<td>fred<td>
  <tr><td>11<td>plugh<td>
  <tr><td>12<td>xyzzy<td>
  <tr><td>13<td>thud<td>
  </table>
</body>
</html>
