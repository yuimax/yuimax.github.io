<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width">
	<title>AI画像のタッチを比較</title>
	<link rel="stylesheet" type="text/css" href="../style.css">
	<style>
		div#main {
		}
		div#main>ul {
			padding-left: 20px;
		}
		svg#image-map {
			max-width: 640px;
		}
		.clickable {
			fill: transparent;
			cursor: pointer; /* マウスオーバー時にカーソルを変更 */
		}
		.clickable:hover {
			fill: skyblue; /* マウスオーバー時の背景色 */
			opacity: 50%;	/* その不透明度 */
		}
	</style>
	<base href="https://bagof.crap.jp/img/vr/">
	<base target="_blank">
</head>
<body>
<div id="main">
	<h1>AI画像のタッチを比較</h1>
	<svg id="image-map" viewBox="0 0 640 320">
		<image href="combined_image.jpg" x="0" y="0" width="640" height="320" />
		<rect id="p0" class="clickable" x="0"   y="0" width="160" height="160" />
		<rect id="p1" class="clickable" x="160" y="0" width="160" height="160" />
		<rect id="p2" class="clickable" x="320" y="0" width="160" height="160" />
		<rect id="p3" class="clickable" x="480" y="0" width="160" height="160" />
		<rect id="p4" class="clickable" x="0"   y="160" width="160" height="160" />
		<rect id="p5" class="clickable" x="160" y="160" width="160" height="160" />
		<rect id="p6" class="clickable" x="320" y="160" width="160" height="160" />
		<rect id="p7" class="clickable" x="480" y="160" width="160" height="160" />
	</svg>
	<ul>
		<li>左から、VRoid 元画像、Grok ルノアール風、Gemini 浮世絵風、Copilot 浮世絵風</li>
		<li>それぞれ「ｘｘｘ風に変えてください」と依頼し、２～３回リテイクした</li>
	</ul>
	<ul>
		<li>Grokのルノアール風は、いかにもそれっぽくて良い</li>
	</ul>
	<ul>
		<li>Gemini と Copilot は、同じ浮世絵風でも、かなりタッチが違う</li>
		<li>たぶん Gemini は、浮世絵を「色っぽいマンガ」と認識している</li>
		<li>一方 Copilot は、浮世絵を「素朴な木版画」と認識している</li>
	</ul>
	<script>
		const image_names = new Map([
			['p0', 'cathy-vroid'],
			['p1', 'cathy-grok-Renoir'],
			['p2', 'cathy-gemini-Ukiyoe'],
			['p3', 'cathy-copilot-Ukiyoe'],
			['p4', 'daisy-vroid'],
			['p5', 'daisy-grok-Renoir'],
			['p6', 'daisy-gemini-Ukiyoe'],
			['p7', 'daisy-copilot-Ukiyoe']
		]);
		const svg = document.querySelector('svg#image-map');
		svg.addEventListener('click', function(event) {
			const id = event.target.id;
			if (image_names.has(id)) {
				const image_name = image_names.get(id);
				const image_file = `${image_name}.jpg`;
				window.open(image_file);
			}
		});
	</script>
</div>
</body>
</html>
